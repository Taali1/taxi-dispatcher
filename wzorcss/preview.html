<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family: system-ui, -apple-system, Arial;
    background:#0f1115;
}

/* overlay */
.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:flex-end;
    justify-content:center;
}

/* modal */
.modal{
    width:100%;
    max-width:420px;
    background:#1a1d23;
    border-radius:22px 22px 0 0;
    padding:22px;
    box-shadow:0 -10px 35px rgba(0,0,0,.6);
}

/* NADAWCA */
.sender{
    font-size:22px;
    font-weight:700;
    color:#ffffff;
}

/* DATA */
.datetime{
    font-size:16px;
    color:#9aa4b2;
    margin-top:4px;
}

/* TREŚĆ */
.message{
    margin-top:18px;
    background:#232730;
    padding:18px;
    border-radius:14px;
    font-size:17px;
    line-height:1.5;
    color:#e6eaf0;
}

/* szybkie odpowiedzi */
.quick{
    display:flex;
    gap:10px;
    overflow-x:auto;
    margin-top:18px;
    padding-bottom:4px;
}

.quick button{
    border:none;
    background:#2b3240;
    color:#7fb3ff;
    padding:12px 16px;
    border-radius:24px;
    font-size:15px;
    font-weight:600;
    white-space:nowrap;
}

/* akcje */
.actions{
    display:flex;
    gap:12px;
    margin-top:22px;
}

.btn{
    flex:1;
    padding:16px;
    border-radius:14px;
    font-size:17px;
    font-weight:600;
    border:none;
}

/* zamknij */
.close{
    background:#2a2f38;
    color:#e6eaf0;
}

/* odpowiedz */
.reply{
    background:#3b82f6;
    color:white;
}

</style>
</head>

<body>

<div class="modal-overlay">

    <div class="modal">

        <div class="sender">Dyspozytor Centrali</div>
        <div class="datetime">28 marca 2026 • 14:32</div>

        <div class="message">
            Kierowco, po zakończeniu kursu prosimy o pilny kontakt
            z centralą w sprawie następnego zlecenia.
        </div>

        <div class="quick">
            <button>OK</button>
            <button>Jadę</button>
            <button>Oddzwonię</button>
            <button>Za 5 min</button>
        </div>

        <div class="actions">
            <button class="btn close">Zamknij</button>
            <button class="btn reply">Odpowiedz</button>
        </div>

    </div>

</div>

</body>
</html>
